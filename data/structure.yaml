# Org chart data for /structure page.
#
# Edit this file to update the chart. The page joins with live `documents`
# counts at request time, so doc counts here are authoritative-by-absence-only
# (i.e. we don't store them — every site_key listed below is looked up live).
#
# A node represents a body in the party-state hierarchy. Bodies we crawl have
# a `site_key` matching documents.site_key; bodies without are context-only
# (rendered in gray) so the chart makes sense to someone new to the system.
#
# Sources: NPC Observer, DigiChina/Stanford, CSET (Georgetown), MERICS,
# CSIS, Naughton (UCIGCC), CECC, CRS, Wikipedia (last verified 2026-04-28).

tiers:
  - id: party
    label: "The Party — 中国共产党"
    intro: >
      The Chinese Communist Party runs in parallel with the state and outranks
      it at every level. None of our 70 crawl targets are party organs — these
      boxes are here so the rest of the chart makes sense.

  - id: legislative
    label: "Legislative — 全国人大"
    intro: >
      The National People's Congress is the legal-source layer. It passes laws
      that the State Council and ministries then implement through regulations.

  - id: state_council
    label: "State Council & Ministries — 国务院"
    intro: >
      The central executive. Headed by the Premier (Li Qiang). Below it sit
      26 constituent departments (ministries / commissions), a handful of
      directly subordinate agencies at ministerial rank, and national bureaus
      that report up through a parent ministry.

  - id: judicial
    label: "Judicial — 最高人民法院"
    intro: >
      The Supreme People's Court is the apex of the regular court system.
      Reports to the NPC but operates independently of the State Council.

  - id: provincial
    label: "Provincial — 省级"
    intro: >
      Provinces, autonomous regions, and direct-controlled municipalities
      (Beijing, Shanghai, Chongqing, Tianjin) are all province-rank. Each
      mirrors the State Council's ministry structure at its own scale.

  - id: cities
    label: "Cities — 副省级市 / 地级市"
    intro: >
      Sub-provincial cities (vice-provincial rank, e.g. Shenzhen, Guangzhou,
      Wuhan, Hangzhou) sit just below province-rank. Prefecture-level cities
      (Guangdong cities, Suzhou, etc.) are one rung lower.

  - id: shenzhen_departments
    label: "Shenzhen Municipal Departments — 深圳市直机关"
    intro: >
      Each Shenzhen bureau is dual-aligned — locally led by the Shenzhen
      municipal government (kuai 块) but operationally tied to a central
      ministry (tiao 条). The "mirrors" column below names the central body
      each bureau answers to functionally.

  - id: shenzhen_districts
    label: "Shenzhen Districts — 深圳市辖区"
    intro: >
      Shenzhen has 8 formal administrative districts plus Dapeng, which is a
      functional zone (新区) without its own People's Congress. Districts run
      day-to-day urban governance: education, sub-bureaus of public security,
      street offices, district courts. Bao'an is a coverage gap.

  - id: media
    label: "Media & Research — 媒体 / 研究"
    intro: >
      Not state organs, but party-state mouthpieces and research institutions
      whose output shapes policy interpretation. Crawled separately from
      government docs.

