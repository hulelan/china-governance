services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    volumes:
      - ../documents.db:/app/documents.db:ro
      - ../raw_html:/app/raw_html:ro
    ports:
      - "8000:8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
