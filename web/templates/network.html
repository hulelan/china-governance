{% extends "base.html" %}
{% block title %}Citation Network — ChinaGovernance{% endblock %}
{% block head %}
<script src="https://d3js.org/d3.v7.min.js"></script>
{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">
    <div class="flex gap-4" style="height: calc(100vh - 100px);">
        <!-- Controls -->
        <div class="w-56 flex-shrink-0 space-y-3">
            <div class="card p-3 text-sm" x-data="{site: '', minDeg: 2, dateStart: '', dateEnd: ''}">
                <div class="card-header -mx-3 -mt-3 mb-3">Filters</div>
                <label class="text-gray-400 text-xs block mb-1">Site</label>
                <select x-model="site" @change="updateNetwork(site, minDeg, dateStart, dateEnd)"
                        class="w-full text-sm mb-3">
                    <option value="">All sites</option>
                    {% for s in sites %}
                    <option value="{{ s.site_key }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
                <label class="text-gray-400 text-xs block mb-1">Min citations</label>
                <input type="range" x-model="minDeg" min="1" max="10" @input="updateNetwork(site, minDeg, dateStart, dateEnd)"
                       class="w-full mb-1">
                <span class="text-gray-500 text-xs" x-text="minDeg + ' citations'"></span>
                <label class="text-gray-400 text-xs block mb-1 mt-3">Date range</label>
                <input type="date" x-model="dateStart" @change="updateNetwork(site, minDeg, dateStart, dateEnd)"
                       class="w-full text-sm mb-1">
                <input type="date" x-model="dateEnd" @change="updateNetwork(site, minDeg, dateStart, dateEnd)"
                       class="w-full text-sm">
            </div>

            <div class="card p-3 text-sm">
                <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Legend</div>
                <div class="space-y-1.5 text-xs">
                    <div><span class="inline-block w-3 h-3 rounded-full bg-red-600 mr-2"></span> Central</div>
                    <div><span class="inline-block w-3 h-3 rounded-full bg-orange-500 mr-2"></span> Provincial</div>
                    <div><span class="inline-block w-3 h-3 rounded-full bg-blue-600 mr-2"></span> Municipal</div>
                    <div><span class="inline-block w-3 h-3 rounded-full bg-green-600 mr-2"></span> District</div>
                    <div><span class="inline-block w-3 h-3 rounded-full bg-gray-400 mr-2"></span> Unknown</div>
                </div>
            </div>

            <div id="node-info" class="card p-3 text-sm hidden">
                <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Selected</div>
                <div id="node-docnum" class="mono text-red-700 mb-1 text-sm"></div>
                <div id="node-title" class="text-gray-600 mb-1 text-xs"></div>
                <div id="node-citations" class="text-gray-400 text-xs"></div>
                <a id="node-link" href="#" class="block mt-2 text-sm">View document</a>
            </div>
        </div>

        <!-- Graph -->
        <div class="flex-1 card overflow-hidden">
            <svg id="network-svg" width="100%" height="100%"></svg>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const COLORS = {central:'#dc2626', provincial:'#ea580c', municipal:'#2563eb', district:'#16a34a', unknown:'#9ca3af'};

let simulation, svg, g;

function initGraph() {
    svg = d3.select('#network-svg');
    const {width, height} = svg.node().getBoundingClientRect();
    g = svg.append('g');
    svg.call(d3.zoom().scaleExtent([0.1, 8]).on('zoom', (e) => g.attr('transform', e.transform)));
    updateNetwork('', 2, '', '');
}

async function updateNetwork(site, minDeg, dateStart, dateEnd) {
    let url = `/api/v1/network?min_degree=${minDeg}`;
    if (site) url += `&site=${site}`;
    if (dateStart) url += `&date_start=${dateStart}`;
    if (dateEnd) url += `&date_end=${dateEnd}`;
    const data = await fetch(url).then(r => r.json());

    g.selectAll('*').remove();
    const {width, height} = svg.node().getBoundingClientRect();

    if (!data.nodes.length) {
        g.append('text').attr('x', width/2).attr('y', height/2)
         .attr('text-anchor', 'middle').attr('fill', '#9ca3af').attr('font-size', 13)
         .text('No nodes match filters');
        return;
    }

    const nodeMap = new Map(data.nodes.map(n => [n.id, n]));
    const edges = data.edges.filter(e => nodeMap.has(e.target));

    if (simulation) simulation.stop();
    simulation = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(edges).id(d => d.id).distance(80))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width/2, height/2))
        .force('collision', d3.forceCollide().radius(d => Math.sqrt(d.citations)*3 + 8));

    const link = g.append('g').selectAll('line')
        .data(edges).join('line')
        .attr('stroke', '#e5e7eb').attr('stroke-width', 0.8);

    const node = g.append('g').selectAll('circle')
        .data(data.nodes).join('circle')
        .attr('r', d => Math.sqrt(d.citations)*3 + 4)
        .attr('fill', d => COLORS[d.level] || COLORS.unknown)
        .attr('stroke', '#fff').attr('stroke-width', 1.5)
        .attr('cursor', 'pointer')
        .call(d3.drag()
            .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
            .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
            .on('end', (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

    node.append('title').text(d => `${d.id} (${d.citations} citations)`);

    node.on('click', (e, d) => {
        document.getElementById('node-info').classList.remove('hidden');
        document.getElementById('node-docnum').textContent = d.id;
        document.getElementById('node-title').textContent = d.title || '(not in corpus)';
        document.getElementById('node-citations').textContent = d.citations + ' citations';
        if (d.resolved) {
            const link = document.getElementById('node-link');
            link.href = `/search?q=${encodeURIComponent(d.id)}`;
            link.classList.remove('hidden');
        }
    });

    const labels = g.append('g').selectAll('text')
        .data(data.nodes.filter(d => d.citations >= 5)).join('text')
        .text(d => d.id)
        .attr('font-size', 9).attr('fill', '#6b7280')
        .attr('dx', d => Math.sqrt(d.citations)*3 + 6).attr('dy', 3);

    simulation.on('tick', () => {
        link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
            .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        node.attr('cx',d=>d.x).attr('cy',d=>d.y);
        labels.attr('x',d=>d.x).attr('y',d=>d.y);
    });
}

document.addEventListener('DOMContentLoaded', initGraph);
</script>
{% endblock %}
