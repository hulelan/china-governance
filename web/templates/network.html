{% extends "base.html" %}
{% block title %}Citation Network — CNGOV{% endblock %}
{% block head %}
<script src="https://d3js.org/d3.v7.min.js"></script>
{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">
    <div class="flex gap-3" style="height: calc(100vh - 80px);">
        <!-- Controls -->
        <div class="w-56 flex-shrink-0 space-y-2">
            <div class="bg-gray-900 border border-gray-800 rounded p-2 text-xs" x-data="{site: '', minDeg: 2, dateStart: '', dateEnd: ''}">
                <div class="font-semibold text-gray-400 uppercase tracking-wider mb-2">Filters</div>
                <label class="text-gray-500 block mb-1">Site</label>
                <select x-model="site" @change="updateNetwork(site, minDeg, dateStart, dateEnd)"
                        class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white mb-2">
                    <option value="">All sites</option>
                    {% for s in sites %}
                    <option value="{{ s.site_key }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
                <label class="text-gray-500 block mb-1">Min citations</label>
                <input type="range" x-model="minDeg" min="1" max="10" @input="updateNetwork(site, minDeg, dateStart, dateEnd)"
                       class="w-full">
                <span class="text-gray-400" x-text="minDeg"></span>
                <label class="text-gray-500 block mb-1 mt-2">Date range</label>
                <input type="date" x-model="dateStart" @change="updateNetwork(site, minDeg, dateStart, dateEnd)"
                       class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white mb-1" style="color-scheme:dark">
                <input type="date" x-model="dateEnd" @change="updateNetwork(site, minDeg, dateStart, dateEnd)"
                       class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-white" style="color-scheme:dark">
            </div>

            <div class="bg-gray-900 border border-gray-800 rounded p-2 text-xs">
                <div class="font-semibold text-gray-400 uppercase tracking-wider mb-2">Legend</div>
                <div class="space-y-1">
                    <div><span class="inline-block w-3 h-3 rounded-full bg-red-500 mr-1"></span> Central</div>
                    <div><span class="inline-block w-3 h-3 rounded-full bg-orange-500 mr-1"></span> Provincial</div>
                    <div><span class="inline-block w-3 h-3 rounded-full bg-blue-500 mr-1"></span> Municipal</div>
                    <div><span class="inline-block w-3 h-3 rounded-full bg-green-500 mr-1"></span> District</div>
                    <div><span class="inline-block w-3 h-3 rounded-full bg-gray-500 mr-1"></span> Unknown</div>
                </div>
            </div>

            <!-- Selected node info -->
            <div id="node-info" class="bg-gray-900 border border-gray-800 rounded p-2 text-xs hidden">
                <div class="font-semibold text-gray-400 uppercase tracking-wider mb-2">Selected</div>
                <div id="node-docnum" class="mono text-amber-400 mb-1"></div>
                <div id="node-title" class="text-gray-300 mb-1"></div>
                <div id="node-citations" class="text-gray-500"></div>
                <a id="node-link" href="#" class="block mt-1">View document</a>
            </div>
        </div>

        <!-- Graph -->
        <div class="flex-1 bg-gray-900 border border-gray-800 rounded overflow-hidden">
            <svg id="network-svg" width="100%" height="100%"></svg>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const COLORS = {central:'#ef4444', provincial:'#f97316', municipal:'#3b82f6', district:'#22c55e', unknown:'#6b7280'};

let simulation, svg, g;

function initGraph() {
    svg = d3.select('#network-svg');
    const {width, height} = svg.node().getBoundingClientRect();
    g = svg.append('g');

    // Zoom
    svg.call(d3.zoom().scaleExtent([0.1, 8]).on('zoom', (e) => g.attr('transform', e.transform)));

    updateNetwork('', 2, '', '');
}

async function updateNetwork(site, minDeg, dateStart, dateEnd) {
    let url = `/api/v1/network?min_degree=${minDeg}`;
    if (site) url += `&site=${site}`;
    if (dateStart) url += `&date_start=${dateStart}`;
    if (dateEnd) url += `&date_end=${dateEnd}`;
    const data = await fetch(url).then(r => r.json());

    g.selectAll('*').remove();
    const {width, height} = svg.node().getBoundingClientRect();

    if (!data.nodes.length) {
        g.append('text').attr('x', width/2).attr('y', height/2)
         .attr('text-anchor', 'middle').attr('fill', '#6b7280').text('No nodes match filters');
        return;
    }

    const nodeMap = new Map(data.nodes.map(n => [n.id, n]));

    // Only keep edges where target exists in nodes
    const edges = data.edges.filter(e => nodeMap.has(e.target));

    if (simulation) simulation.stop();
    simulation = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(edges).id(d => d.id).distance(80))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width/2, height/2))
        .force('collision', d3.forceCollide().radius(d => Math.sqrt(d.citations)*3 + 8));

    const link = g.append('g').selectAll('line')
        .data(edges).join('line')
        .attr('stroke', '#374151').attr('stroke-width', 0.5);

    const node = g.append('g').selectAll('circle')
        .data(data.nodes).join('circle')
        .attr('r', d => Math.sqrt(d.citations)*3 + 4)
        .attr('fill', d => COLORS[d.level] || COLORS.unknown)
        .attr('stroke', '#1f2937').attr('stroke-width', 1)
        .attr('cursor', 'pointer')
        .call(d3.drag()
            .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
            .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
            .on('end', (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

    node.append('title').text(d => `${d.id} (${d.citations} citations)`);

    node.on('click', (e, d) => {
        document.getElementById('node-info').classList.remove('hidden');
        document.getElementById('node-docnum').textContent = d.id;
        document.getElementById('node-title').textContent = d.title || '(not in corpus)';
        document.getElementById('node-citations').textContent = d.citations + ' citations';
        if (d.resolved) {
            const link = document.getElementById('node-link');
            link.href = `/search?q=${encodeURIComponent(d.id)}`;
            link.classList.remove('hidden');
        }
    });

    // Labels for high-degree nodes
    const labels = g.append('g').selectAll('text')
        .data(data.nodes.filter(d => d.citations >= 5)).join('text')
        .text(d => d.id)
        .attr('font-size', 9).attr('fill', '#9ca3af')
        .attr('dx', d => Math.sqrt(d.citations)*3 + 6).attr('dy', 3);

    simulation.on('tick', () => {
        link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
            .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        node.attr('cx',d=>d.x).attr('cy',d=>d.y);
        labels.attr('x',d=>d.x).attr('y',d=>d.y);
    });
}

document.addEventListener('DOMContentLoaded', initGraph);
</script>
{% endblock %}
